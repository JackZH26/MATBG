project: matbg_interband_pairing_superfluid_stiffness
created: 2026-06-10
purpose: prb_major_revision_grid_truncation_shell_robustness

bm_model:
  theta_deg: 1.05
  vF_eV_A: 2.135
  w0_meV: 87.2
  w1_meV: 109.0
  n_shell_values: [2, 3, 4]

scan:
  nk_values: [9, 11, 13, 15]
  n_keep_values: [4, 6, 8]
  mu_meV_values: [-4.0, -2.0, 0.0, 2.0, 4.0]
  eta_values: [0.0, 0.5, 1.0]
  delta0_meV: 1.0
  finite_difference_dk_Ainv: 1.0e-6
  normalization_modes:
    - fixed_frobenius_norm
    - fixed_delta0

pairing:
  partner_convention: tr_sewn
  m0: tau0_sigma0
  m1: taux_sigmax

outputs:
  matrix_csv: data/processed/prb_major_revision_robustness_matrix.csv
  summary_csv: data/processed/prb_major_revision_robustness_summary.csv
  audit_csv: data/processed/prb_major_revision_robustness_audit.csv
  figure_png: figures/prb_major_revision_robustness_matrix.png
  figure_pdf: figures/prb_major_revision_robustness_matrix.pdf

commands:
  scan: >
    python3 scripts/run_prb_major_revision_robustness.py
  audit: >
    python3 scripts/audit_prb_major_revision_robustness.py
  plot: >
    python3 scripts/plot_prb_major_revision_robustness.py
