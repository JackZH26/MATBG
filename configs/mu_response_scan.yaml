project: matbg_interband_pairing_superfluid_stiffness
created: 2026-06-07
purpose: first_mu_response_scan

bm_model:
  theta_deg: 1.05
  vF_eV_A: 2.135
  w0_meV: 87.2
  w1_meV: 109.0
  n_shell: 3

scan:
  nk: 7
  n_keep: 6
  mu_meV_values: [-6.0, -4.0, -2.0, 0.0, 2.0, 4.0, 6.0]
  eta_values: [0.0, 0.5, 1.0]
  delta0_meV: 1.0
  finite_difference_dk_Ainv: 1.0e-6
  normalization_modes:
    - fixed_frobenius_norm
    - fixed_delta0

pairing:
  partner_convention: tr_sewn
  m0: tau0_sigma0
  m1: taux_sigmax

outputs:
  csv: data/processed/mu_response_scan_nk7_nkeep6.csv
  figure_png: figures/mu_response_scan_nk7_nkeep6.png
  figure_pdf: figures/mu_response_scan_nk7_nkeep6.pdf
